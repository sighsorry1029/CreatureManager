# CreatureManager creature samples.
# This .sample.yml file is not loaded automatically.
# Install MonsterLabZ, then rename this file to creatures_sample.yml to activate all samples.
# Bonebeard, Vincent, and Root Witch require MonsterLabZ; Vitrfell itself uses a vanilla creature source.
# Vitrfell's boar2.png is bundled and generated when missing while the client option Generate Sample Textures is On.

- prefab: vitrfell
  clonedFrom: Boar
  character:
    name: $vitrfell
    faction: Boss
    boss: true, false, ''
    defeatSetGlobalKey: ''
    health: 500, 3600
    damageModifiers:
      blunt: Normal
      slash: Normal
      pierce: Normal
      chop: Ignore
      pickaxe: Ignore
      fire: Normal
      frost: Normal
      lightning: Normal
      poison: Normal
      spirit: Immune
    speed: 2, 5, 1.5, 100, 8, 200, 0.8
    jump: 10, 0, 0.7, 0.1, 10
    swim: true, 0.81, 2, 100, 0.05
    flight: false, 5, 12, 12
  ai: Boar
  humanoid:
    defaultItems:
      - boar_base_attack_boss
    randomWeapon: []
    randomArmor: []
    randomHair: []
    randomShield: []
    randomItems: []
    randomSets: []
  scale: 2
  textures: ['Poly Art Boar:0:boar2']
  availableAttackAnimations: [base_attack]

