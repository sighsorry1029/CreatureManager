cm_unit_seconds: "{value}s"

cm_modifier_enraged_name: "Enraged"
cm_modifier_enraged_description: "Increases outgoing damage by {power}."
cm_modifier_fire_name: "Fire"
cm_modifier_fire_description: "Adds fire damage equal to {power} of the original hit damage."
cm_modifier_frost_name: "Frost"
cm_modifier_frost_description: "Adds frost damage equal to {power} of the original hit damage."
cm_modifier_lightning_name: "Lightning"
cm_modifier_lightning_description: "Adds lightning damage equal to {power} of the original hit damage."
cm_modifier_spirit_name: "Spirit"
cm_modifier_spirit_description: "Adds spirit damage equal to {power} of the original hit damage. Against players, a damaging hit adds that amount to vanilla Spirit damage-over-time; its ticks bypass resistance and armor."
cm_modifier_armor_piercing_name: "Armor Piercing"
cm_modifier_armor_piercing_description: "Against players, ignores {power} of body armor for that hit."
cm_modifier_staggering_name: "Staggering"
cm_modifier_staggering_description: "Increases outgoing normal-hit and block-stagger buildup by {power}."
cm_modifier_undodgeable_name: "Undodgeable"
cm_modifier_undodgeable_description: "Attacks against players ignore dodge invulnerability but deal {power} less damage. Blocking and parrying remain available."

cm_modifier_armored_name: "Armored"
cm_modifier_armored_description: "Reduces incoming damage by {power}."
cm_modifier_deathward_name: "Deathward"
cm_modifier_deathward_description: "Cancels lethal damage and restores health to {health} of max health, with a {cooldown} cooldown and a limit of {activations} activations per creature."
cm_modifier_regenerating_name: "Regenerating"
cm_modifier_regenerating_description: "Heals {power} of max health every second."
cm_modifier_reflection_name: "Reflection"
cm_modifier_reflection_description: "On direct melee hits, has a {chance} chance to remove health from the hostile attacker equal to {power} of the creature's actual health loss. The reflected health loss bypasses defense and resistance."
cm_modifier_vortex_name: "Vortex"
cm_modifier_vortex_description: "On projectile hits, has a {power} chance to ignore all damage, push, stagger, and status effects."
cm_modifier_adaptive_name: "Adaptive"
cm_modifier_adaptive_description: "Remembers one hit's dominant damage type for {duration} without changing it. Matching damage is reduced by {power} until the memory expires."
cm_modifier_unflinching_name: "Unflinching"
cm_modifier_unflinching_description: "Cannot be staggered by normal hits or perfect parries, preventing the vanilla double-damage stagger window."
cm_modifier_chameleon_name: "Chameleon"
cm_modifier_chameleon_description: "While alerted, becomes immune to one non-immune damage type and changes that immunity every {interval}."

cm_modifier_exposed_name: "Exposed"
cm_modifier_exposed_description: "On damaging a player, has a {chance} chance to make that player take {power} more damage for {duration}."
cm_modifier_weakened_name: "Weakened"
cm_modifier_weakened_description: "On damaging a player, has a {chance} chance to make that player deal {power} less damage for {duration}."
cm_modifier_withered_name: "Withered"
cm_modifier_withered_description: "On damaging a player, has a {chance} chance to reduce that player's healing received by {power} for {duration}."
cm_modifier_crippling_name: "Crippling"
cm_modifier_crippling_description: "On damaging a player, has a {chance} chance to reduce movement by {movement} and jump force by {jump} for {duration}."
cm_modifier_disruptive_name: "Disruptive"
cm_modifier_disruptive_description: "On damaging a player, has a {chance} chance to reduce stamina recovery by {stamina} and eitr recovery by {eitr} for {duration}."
cm_modifier_adrenaline_drain_name: "Adrenaline Drain"
cm_modifier_adrenaline_drain_description: "On damaging a player, has a {chance} chance to remove {power} of current adrenaline and reduce adrenaline gained by {gain} for {duration}."
cm_modifier_corrosive_name: "Corrosive"
cm_modifier_corrosive_description: "On damaging a player, has a {chance} chance to increase durability loss for equipped helmet, chest, legs, cape, weapons, and shield by {power} for {duration}."
cm_modifier_toxic_death_name: "Toxic Death"
cm_modifier_toxic_death_description: "On death, poisons players within {radius} for {power} of each player's max health."

cm_modifier_swift_name: "Swift"
cm_modifier_swift_description: "Increases movement speed, acceleration, and turning speed by {power}."
cm_modifier_attack_speed_name: "Attack Speed"
cm_modifier_attack_speed_description: "Increases attack animation speed by {power} and shortens both weapon and creature AI attack intervals to {interval} of normal."
cm_modifier_vampiric_name: "Vampiric"
cm_modifier_vampiric_description: "Heals the creature for {power} of health removed by direct hits. Delayed damage-over-time is excluded."
cm_modifier_reaping_name: "Reaping"
cm_modifier_reaping_description: "When a player or this creature kills a nearby creature, this creature heals for {heal} of its base max health and gains {health} base max health, {damage} outgoing damage, and {scale} size."
cm_modifier_blink_name: "Blink"
cm_modifier_blink_description: "Can teleport near a player target within {range} every {cooldown}."
cm_modifier_omen_name: "Omen"
cm_modifier_omen_description: "When killed directly by a player, has a {power} chance to force an Enforcer summon check regardless of cooldown."
cm_modifier_juggernaut_name: "Juggernaut"
cm_modifier_juggernaut_description: "On a damaging hit against a player, raises push force to at least {force}. A hit that reaches vanilla pushback starts a {cooldown} cooldown. Attack hits cannot push this creature."
cm_modifier_blamer_name: "Blamer"
cm_modifier_blamer_description: "Below {health} health, flees from hostile players and adds {karma} Karma per second to its current region while fleeing, up to {cap} Karma over its lifetime."

