cm_group_offense: "공격: 격노부터 회피 불가까지"
cm_group_defense: "방어: 중장갑부터 카멜레온까지"
cm_group_affliction: "약화: 노출부터 맹독의 죽음까지"
cm_group_special: "특수: 신속부터 비난자까지"
cm_unit_seconds: "{value}초"

cm_modifier_enraged_name: "격노"
cm_modifier_enraged_description: "주는 피해가 {power} 증가합니다."
cm_modifier_fire_name: "화염"
cm_modifier_fire_description: "원래 타격 피해의 {power}만큼 화염 피해를 추가합니다."
cm_modifier_frost_name: "냉기"
cm_modifier_frost_description: "원래 타격 피해의 {power}만큼 냉기 피해를 추가합니다."
cm_modifier_lightning_name: "번개"
cm_modifier_lightning_description: "원래 타격 피해의 {power}만큼 번개 피해를 추가합니다."
cm_modifier_spirit_name: "영혼"
cm_modifier_spirit_description: "원래 타격 피해의 {power}만큼 영혼 피해를 추가합니다. 플레이어에게는 피해를 주는 타격이 같은 양의 기본 영혼 지속 피해를 추가하며, 그 틱 피해는 저항과 방어력을 무시합니다."
cm_modifier_armor_piercing_name: "방어구 관통"
cm_modifier_armor_piercing_description: "플레이어를 공격할 때 해당 타격이 신체 방어력의 {power}를 무시합니다."
cm_modifier_staggering_name: "충격"
cm_modifier_staggering_description: "일반 타격과 방어 시 누적되는 비틀거림이 {power} 증가합니다."
cm_modifier_undodgeable_name: "회피 불가"
cm_modifier_undodgeable_description: "플레이어를 향한 공격이 회피 무적 상태를 무시하지만 해당 공격의 피해가 {power} 감소합니다. 방어와 패링은 정상적으로 적용됩니다."

cm_modifier_armored_name: "중장갑"
cm_modifier_armored_description: "받는 피해가 {power} 감소합니다."
cm_modifier_deathward_name: "죽음 방지"
cm_modifier_deathward_description: "치명적인 피해를 무효화하고 최대 체력의 {health}까지 회복합니다. 재사용 대기시간은 {cooldown}이며 개체당 최대 {activations}회 발동합니다."
cm_modifier_regenerating_name: "재생"
cm_modifier_regenerating_description: "매초 최대 체력의 {power}를 회복합니다."
cm_modifier_reflection_name: "반사"
cm_modifier_reflection_description: "직접 근접 공격을 받으면 {chance} 확률로 실제 잃은 체력의 {power}만큼 적대적인 공격자의 체력을 감소시킵니다. 반사 피해는 방어력과 저항을 무시합니다."
cm_modifier_vortex_name: "소용돌이"
cm_modifier_vortex_description: "투사체에 맞으면 {power} 확률로 모든 피해, 밀치기, 비틀거림, 상태 효과를 무시합니다."
cm_modifier_adaptive_name: "적응"
cm_modifier_adaptive_description: "한 번의 타격에서 가장 큰 피해 유형을 {duration} 동안 기억하며 그사이 기억을 바꾸지 않습니다. 기억한 유형의 피해를 기억이 끝날 때까지 {power} 감소시킵니다."
cm_modifier_unflinching_name: "불굴"
cm_modifier_unflinching_description: "일반 피격과 완벽한 패링으로 비틀거리지 않으며, 기본 두 배 피해의 비틀거림 상태가 되지 않습니다."
cm_modifier_chameleon_name: "카멜레온"
cm_modifier_chameleon_description: "경계 중에는 원래 면역이 아닌 피해 유형 하나에 면역이 되고, {interval}마다 면역 유형이 바뀝니다."

cm_modifier_exposed_name: "노출"
cm_modifier_exposed_description: "플레이어에게 피해를 주면 {chance} 확률로 {duration} 동안 그 플레이어가 받는 피해를 {power} 증가시킵니다."
cm_modifier_weakened_name: "약화"
cm_modifier_weakened_description: "플레이어에게 피해를 주면 {chance} 확률로 {duration} 동안 그 플레이어가 주는 피해를 {power} 감소시킵니다."
cm_modifier_withered_name: "쇠약"
cm_modifier_withered_description: "플레이어에게 피해를 주면 {chance} 확률로 {duration} 동안 그 플레이어가 받는 회복량을 {power} 감소시킵니다."
cm_modifier_crippling_name: "불구"
cm_modifier_crippling_description: "플레이어에게 피해를 주면 {chance} 확률로 {duration} 동안 이동 속도를 {movement}, 점프 힘을 {jump} 감소시킵니다."
cm_modifier_disruptive_name: "교란"
cm_modifier_disruptive_description: "플레이어에게 피해를 주면 {chance} 확률로 {duration} 동안 스태미나 회복을 {stamina}, 에이트르 회복을 {eitr} 감소시킵니다."
cm_modifier_adrenaline_drain_name: "아드레날린 흡수"
cm_modifier_adrenaline_drain_description: "플레이어에게 피해를 주면 {chance} 확률로 현재 아드레날린의 {power}를 제거하고 {duration} 동안 아드레날린 획득량을 {gain} 감소시킵니다."
cm_modifier_corrosive_name: "부식"
cm_modifier_corrosive_description: "플레이어에게 피해를 주면 {chance} 확률로 {duration} 동안 착용 중인 투구, 흉갑, 다리 방어구, 망토, 무기와 방패의 내구도 손실을 {power} 증가시킵니다."
cm_modifier_toxic_death_name: "맹독의 죽음"
cm_modifier_toxic_death_description: "죽을 때 {radius} 안의 플레이어에게 각 플레이어 최대 체력의 {power}만큼 독 피해를 줍니다."

cm_modifier_swift_name: "신속"
cm_modifier_swift_description: "이동 속도, 가속도, 회전 속도가 {power} 증가합니다."
cm_modifier_attack_speed_name: "공격 속도"
cm_modifier_attack_speed_description: "공격 애니메이션 속도가 {power} 증가하고 무기 및 몬스터 AI 공격 간격이 기본값의 {interval}로 줄어듭니다."
cm_modifier_vampiric_name: "흡혈"
cm_modifier_vampiric_description: "직접 타격으로 실제 감소시킨 체력의 {power}만큼 회복합니다. 지연된 지속 피해는 제외됩니다."
cm_modifier_reaping_name: "수확"
cm_modifier_reaping_description: "플레이어나 이 개체가 주변 생물을 처치하면 기본 최대 체력의 {heal}를 회복하고, 기본 최대 체력이 {health}, 주는 피해가 {damage}, 크기가 {scale} 증가합니다."
cm_modifier_blink_name: "점멸"
cm_modifier_blink_description: "{cooldown}마다 {range} 안에 있는 플레이어 대상 근처로 순간이동할 수 있습니다."
cm_modifier_blink_alert_grace: "경계 상태가 된 뒤 {duration} 동안 점멸과 점멸용 확장 공격 사거리가 비활성화됩니다."
cm_modifier_omen_name: "징조"
cm_modifier_omen_description: "플레이어의 직접 공격 또는 한 플레이어에게 명확히 귀속된 독·불·영혼 지속 피해로 처치되면 {power} 확률로 처단자 소환 검사를 강제로 실행합니다. 재사용 대기시간 차단 여부는 서버 설정을 따릅니다."
cm_modifier_juggernaut_name: "저거너트"
cm_modifier_juggernaut_description: "플레이어에게 피해를 주는 타격의 밀치기 힘을 최소 {force}로 높입니다. 기본 밀치기가 발생한 타격부터 {cooldown}의 재사용 대기시간이 시작됩니다. 이 몹은 공격에 밀려나지 않습니다."
cm_modifier_blamer_name: "비난자"
cm_modifier_blamer_description: "체력이 {health} 미만이면 적대적인 플레이어에게서 도망치며, 도주 중 매초 현재 지역에 카르마를 {karma} 추가합니다. 개체 수명 동안 최대 {cap}까지 추가합니다."

cm_value_unlimited: "무제한"

