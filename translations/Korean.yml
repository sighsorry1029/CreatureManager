cm_message_karma_level_05: "대지가 대가를 요구하고 있다."
cm_message_enforcer_spawn_01: "그대의 죽음조차 대가로는 부족하다."
cm_message_enforcer_spawn_02: "나는 그대만을 위해 만들어진 악몽이다."
